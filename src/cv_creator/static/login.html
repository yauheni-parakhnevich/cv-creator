<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Creator</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css?v=8">
</head>
<body>
    <div class="container login-container">
        <header>
            <div class="header-top">
                <h1 id="app-title">CV Creator</h1>
                <select id="lang-select" class="lang-select">
                    <option value="en">EN</option>
                    <option value="de">DE</option>
                </select>
            </div>
            <p id="login-subtitle"></p>
        </header>

        <section class="profiles-section">
            <div id="profiles-list" class="profiles-grid"></div>
            <div id="profiles-empty" class="empty-state"></div>

            <div class="new-profile-area">
                <button id="toggle-form-btn" class="btn btn-new-profile"></button>

                <form id="profile-form" class="new-profile-form hidden">
                    <h3 id="form-title"></h3>
                    <div class="card-form">
                        <div class="card-form-row">
                            <div class="card-form-label" id="label-name"></div>
                            <div class="card-form-field">
                                <input type="text" id="profile_name" name="name" required placeholder="">
                            </div>
                        </div>
                        <div class="card-form-row">
                            <div class="card-form-label" id="label-default-style"></div>
                            <div class="card-form-field">
                                <select id="profile_cv_style" name="cv_style">
                                    <option value="executive" id="opt-executive"></option>
                                    <option value="normal" id="opt-normal"></option>
                                </select>
                            </div>
                        </div>
                        <div class="card-form-row">
                            <div class="card-form-label" id="label-cv-file"></div>
                            <div class="card-form-field-stack">
                                <input type="file" id="profile_cv_file" name="cv_file" accept=".pdf,.md">
                                <small id="cv-current" class="form-hint hidden"></small>
                            </div>
                        </div>
                    </div>
                    <div class="card-form-actions">
                        <button type="submit" id="create-btn" class="btn-primary"></button>
                        <button type="button" id="cancel-btn" class="btn-secondary"></button>
                    </div>
                </form>
            </div>
        </section>
    </div>

    <script src="/static/i18n.js?v=8"></script>
    <script src="/static/login.js?v=8"></script>
</body>
</html>
